name: Deploy Astro to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: astro-src/package-lock.json

      - name: Show workspace
        run: |
          echo "PWD=$(pwd)"
          ls -la
          echo "--- astro-src ---"
          ls -la astro-src
          echo "--- package.json ---"
          cat astro-src/package.json

      - name: Install dependencies
        working-directory: astro-src
        run: npm ci

      - name: Build site
        working-directory: astro-src
        run: npm run build

      - name: Show dist
        run: |
          echo "--- dist ---"
          ls -la astro-src/dist
          find astro-src/dist -maxdepth 3 -type f | sort | head -100

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: astro-src/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4